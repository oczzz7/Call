version: '3.8'

services:
  app:
    build: .
    container_name: callcenter_app
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DB_HOST=db  # 📌 ეს ხაზი დოკერში გადაფარავს .env ფაილის localhost-ს
    restart: unless-stopped
    networks:
      - callcenter_net

  db:
    image: postgres:15-alpine
    container_name: callcenter_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - callcenter_net

volumes:
  pgdata:

networks:
  callcenter_net:
    driver: bridge